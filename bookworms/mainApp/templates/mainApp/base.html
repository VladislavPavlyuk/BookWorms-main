{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Bookworms{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">📚 Bookworms</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav ms-auto align-items-center">
                {% if user.is_authenticated %}
                <li class="nav-item">
            <span class="nav-link text-white me-3 d-inline-block">
                👋 {{ user.username }}
            </span>
                </li>

                <li class="nav-item">
                    <form action="{% url 'logout' %}" method="post" class="m-0 p-0 d-inline-block">
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link text-white text-decoration-none border-0 p-0"
                                style="background: none; vertical-align: middle; cursor: pointer;">
                            🚪 Вихід
                        </button>
                    </form>
                </li>

                {% else %}
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'login' %}">➡️ Вхід</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'register' %}">🔑 Реєстрація</a>
                </li>
                {% endif %}
            </ul>

        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
