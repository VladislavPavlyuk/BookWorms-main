{% extends "mainApp/base.html" %}
{% block title %}Редагування профілю{% endblock %}

{% block content %}
<h2 class="mb-3">Редагування профілю</h2>

<form method="post" enctype="multipart/form-data" class="card card-body" style="max-width: 40rem;">
    {% csrf_token %}

    <div class="mb-3">
        <label>{{ form.username.label }}</label>
        {{ form.username }}
    </div>
    <div class="mb-3">
        <label>{{ form.biography.label }}</label>
        {{ form.biography }}
    </div>
    <div class="mb-3">
        <label>{{ form.avatar.label }}</label>
        {{ form.avatar }}
    </div>

    <label class="form-label fw-bold">Оберіть аватар з колекції:</label>
<div class="row g-3 mb-3">
    {% for avatar in form.avatar_choice.field.queryset %}
        <div class="col-4 col-sm-3 col-md-2 text-center">
            <label class="avatar-option">
                <input type="radio" name="avatar_choice" value="{{ avatar.id }}"
                       {% if form.avatar_choice.value|add:"0" == avatar.id %}checked{% endif %}
                       class="btn-check">

                <img src="{{ avatar.image.url }}"
                     class="img-thumbnail rounded-circle"
                     style="width: 70px; height: 70px; object-fit: cover; cursor: pointer;"
                     alt="{{ avatar.name }}">
            </label>
        </div>
    {% endfor %}
</div>

<style>
    .avatar-option input:checked + img {
        border: 3px solid #0d6efd;
        background-color: #e7f1ff;
        padding: 2px;
    }
    .avatar-option img:hover {
        opacity: 0.8;
    }
</style>
</div>

    <button type="submit" class="btn btn-primary">Зберегти</button>
    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Скасувати</a>
</form>

<style>
    .avatar-option input { display: none; }
    .avatar-option input:checked + img { border: 3px solid #0d6efd; padding: 2px; }
</style>
{% endblock %}
