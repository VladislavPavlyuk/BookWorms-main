{% extends "mainApp/base.html" %}

{% block title %}Профіль{% endblock %}

{% block content %}

<h2 class="mb-3">Профіль</h2>

<p><strong>Логін:</strong> {{ user.username }}</p>
<p><strong>Біографія:</strong> {{ user.biography|default:"-" }}</p>

{% if user.avatar %}
    <p class="mt-3"><img src="{{ user.avatar.url }}" alt="Аватар" class="img-thumbnail" width="150"></p>
{% endif %}

<p class="mt-3">
    <a href="{% url 'edit_profile' %}" class="btn btn-primary">Редагувати профіль</a>
</p>

{% endblock %}
